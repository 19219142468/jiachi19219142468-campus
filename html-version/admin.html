<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级管理员后台 - 嘉驰校园服务</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">🎓 管理后台</div>
    <nav class="admin-menu">
      <div class="menu-item active" onclick="switchAdminTab('dashboard')">📊 数据概览</div>
      <div class="menu-item" onclick="switchAdminTab('orders')">📋 全部订单</div>
      <div class="menu-item" onclick="switchAdminTab('agents')">👥 接单员管理</div>
      <div class="menu-item" onclick="switchAdminTab('finance')">💰 收入统计</div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-outline btn-block" onclick="adminLogout()">退出登录</button>
    </div>
  </aside>

  <main class="admin-main">
    <div id="tab-dashboard" class="admin-tab active">
      <h2 class="page-title">数据概览</h2>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" id="statTotalOrders">0</div>
          <div class="stat-label">总订单数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTodayOrders">0</div>
          <div class="stat-label">今日订单</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotalIncome">¥0</div>
          <div class="stat-label">总收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statAgentCount">0</div>
          <div class="stat-label">接单员数</div>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">最近订单</h3>
        <div id="recentOrders" class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>服务类型</th>
                <th>金额</th>
                <th>状态</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody id="recentOrderList"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-orders" class="admin-tab">
      <h2 class="page-title">全部订单</h2>
      <div class="filter-bar">
        <select id="orderStatusFilter" onchange="loadAllOrders()">
          <option value="all">全部状态</option>
          <option value="pending">待支付</option>
          <option value="paid">待接单</option>
          <option value="processing">进行中</option>
          <option value="completed">已完成</option>
          <option value="cancelled">已取消</option>
        </select>
        <input type="text" id="orderSearch" placeholder="搜索订单号/手机号" onkeyup="loadAllOrders()">
      </div>
      <div class="card">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>服务类型</th>
                <th>用户手机号</th>
                <th>金额</th>
                <th>接单员</th>
                <th>状态</th>
                <th>下单时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="allOrderList"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-agents" class="admin-tab">
      <h2 class="page-title">接单员管理</h2>
      <div class="filter-bar">
        <button class="btn-primary" onclick="showAddAgentModal()">+ 添加接单员</button>
        <input type="text" id="agentSearch" placeholder="搜索姓名/手机号" onkeyup="loadAgents()">
      </div>
      <div class="card">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>手机号</th>
                <th>接单数量</th>
                <th>总收入</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="agentList"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-finance" class="admin-tab">
      <h2 class="page-title">收入统计</h2>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" id="financeTotal">¥0</div>
          <div class="stat-label">平台总收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="financeToday">¥0</div>
          <div class="stat-label">今日收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="financeMonth">¥0</div>
          <div class="stat-label">本月收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="financeAgentCost">¥0</div>
          <div class="stat-label">接单员分成</div>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">接单员收入排行</h3>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>排名</th>
                <th>接单员</th>
                <th>完成订单</th>
                <th>总收入</th>
              </tr>
            </thead>
            <tbody id="agentRankList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="addAgentModal" class="modal">
  <div class="modal-content">
    <h3>添加接单员</h3>
    <div class="form-item">
      <label>姓名</label>
      <input type="text" id="newAgentName" placeholder="请输入姓名">
    </div>
    <div class="form-item">
      <label>手机号</label>
      <input type="tel" id="newAgentPhone" placeholder="请输入手机号（登录账号）">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="text" id="newAgentPassword" value="123456" placeholder="请输入密码">
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="hideAddAgentModal()">取消</button>
      <button class="btn-primary" onclick="addAgent()">确认添加</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
initAdminPage();
</script>
</body>
</html>
