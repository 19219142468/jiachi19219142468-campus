<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下单 - 嘉驰校园服务</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <button class="btn-back" onclick="goHome()">← 返回</button>
    <div class="title" id="pageTitle">下单</div>
    <div style="width:50px"></div>
  </header>

  <div class="order-form">
    <div class="form-section">
      <h3 class="form-title">服务信息</h3>
      
      <div class="form-item">
        <label>服务类型</label>
        <select id="serviceType" onchange="updatePrice()">
          <option value="express">快递代取</option>
          <option value="print">打印复印</option>
          <option value="course">课程辅导</option>
          <option value="handwriting">代写服务</option>
        </select>
      </div>

      <div class="form-item" id="expressFields">
        <label>快递地址</label>
        <input type="text" id="expressAddress" placeholder="请输入快递所在位置（如：菜鸟驿站、京东快递点等）">
      </div>

      <div class="form-item" id="expressSize">
        <label>快递大小</label>
        <select id="packageSize" onchange="updatePrice()">
          <option value="small">小件（3元）</option>
          <option value="medium">中件（5元）</option>
          <option value="large">大件（8元）</option>
        </select>
      </div>

      <div class="form-item" id="printFields" style="display:none">
        <label>打印要求</label>
        <textarea id="printRequirement" placeholder="请描述打印需求，如：黑白单面、10份等"></textarea>
      </div>

      <div class="form-item" id="printCount" style="display:none">
        <label>打印张数</label>
        <input type="number" id="printPages" value="1" min="1" onchange="updatePrice()">
      </div>

      <div class="form-item" id="courseFields" style="display:none">
        <label>课程名称</label>
        <input type="text" id="courseName" placeholder="请输入课程名称">
      </div>

      <div class="form-item" id="handwritingFields" style="display:none">
        <label>代写内容</label>
        <textarea id="handwritingContent" placeholder="请描述代写需求"></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3 class="form-title">联系方式</h3>
      
      <div class="form-item">
        <label>手机号码 <span class="required">*</span></label>
        <input type="tel" id="phone" placeholder="请输入手机号码">
      </div>

      <div class="form-item">
        <label>送达地址</label>
        <input type="text" id="deliveryAddress" placeholder="请输入宿舍号或送达地址">
      </div>

      <div class="form-item">
        <label>备注说明</label>
        <textarea id="remark" placeholder="有什么特殊要求可以写在这里"></textarea>
      </div>
    </div>

    <div class="price-bar">
      <div class="price-info">
        <span>预估价格</span>
        <span class="price-value" id="totalPrice">￥3.00</span>
      </div>
      <button class="btn-primary btn-large" onclick="submitOrder()">提交订单</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
initOrderPage();
</script>
</body>
</html>
