<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接单员登录 - 嘉驰校园服务</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <h2 class="login-title">接单员登录</h2>
    <div class="form-item">
      <label>手机号</label>
      <input type="tel" id="agentPhone" placeholder="请输入手机号">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="password" id="agentPassword" placeholder="请输入密码">
    </div>
    <button class="btn-primary btn-large btn-block" onclick="agentLogin()">登 录</button>
    <p class="login-tip">请联系管理员开通账号</p>
    <div class="login-links">
      <a href="admin-login.html">管理员登录入口</a>
      <a href="index.html">返回首页</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
