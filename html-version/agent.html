<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接单员后台 - 嘉驰校园服务</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">🎯 接单员后台</div>
    <div class="agent-info">
      <div class="agent-name" id="agentName">接单员</div>
      <div class="agent-phone" id="agentPhone"></div>
    </div>
    <nav class="admin-menu">
      <div class="menu-item active" onclick="switchAgentTab('pool')">📥 抢单大厅</div>
      <div class="menu-item" onclick="switchAgentTab('myOrders')">📋 我的订单</div>
      <div class="menu-item" onclick="switchAgentTab('income')">💰 我的收入</div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-outline btn-block" onclick="agentLogout()">退出登录</button>
    </div>
  </aside>

  <main class="admin-main">
    <div id="agent-tab-pool" class="admin-tab active">
      <h2 class="page-title">抢单大厅</h2>
      <div class="filter-bar">
        <select id="poolServiceFilter" onchange="loadOrderPool()">
          <option value="all">全部服务</option>
          <option value="express">快递代取</option>
          <option value="print">打印复印</option>
          <option value="course">课程辅导</option>
          <option value="handwriting">代写服务</option>
        </select>
        <button class="btn-primary" onclick="loadOrderPool()">🔄 刷新</button>
      </div>
      <div id="orderPoolList" class="order-pool-grid"></div>
    </div>

    <div id="agent-tab-myOrders" class="admin-tab">
      <h2 class="page-title">我的订单</h2>
      <div class="filter-bar">
        <select id="myOrderStatusFilter" onchange="loadMyAgentOrders()">
          <option value="all">全部状态</option>
          <option value="processing">进行中</option>
          <option value="completed">已完成</option>
        </select>
      </div>
      <div class="card">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>服务类型</th>
                <th>金额</th>
                <th>用户信息</th>
                <th>状态</th>
                <th>接单时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="myAgentOrderList"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="agent-tab-income" class="admin-tab">
      <h2 class="page-title">我的收入</h2>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" id="myTotalIncome">¥0</div>
          <div class="stat-label">总收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="myTodayIncome">¥0</div>
          <div class="stat-label">今日收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="myMonthIncome">¥0</div>
          <div class="stat-label">本月收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="myOrderCount">0</div>
          <div class="stat-label">完成订单</div>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">收入明细</h3>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>服务类型</th>
                <th>金额</th>
                <th>完成时间</th>
              </tr>
            </thead>
            <tbody id="incomeDetailList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
initAgentPage();
</script>
</body>
</html>
