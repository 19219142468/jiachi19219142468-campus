<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 - 嘉驰校园服务</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <h2 class="login-title">超级管理员登录</h2>
    <div class="form-item">
      <label>账号</label>
      <input type="text" id="adminUsername" placeholder="请输入账号">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="password" id="adminPassword" placeholder="请输入密码">
    </div>
    <button class="btn-primary btn-large btn-block" onclick="adminLogin()">登 录</button>
    <p class="login-tip">默认账号：admin / 密码：admin123</p>
    <div class="login-links">
      <a href="agent-login.html">接单员登录入口</a>
      <a href="index.html">返回首页</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
